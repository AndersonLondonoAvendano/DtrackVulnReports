{% extends "base.html" %}
{% block title %}Reportes — VulnTrack Reports{% endblock %}

{% block content %}
<div class="max-w-2xl space-y-6">
  <div>
    <p class="font-mono text-xs uppercase tracking-[0.2em] text-signal">Ejecutivo</p>
    <h1 class="font-display text-3xl font-semibold text-slate-50 mt-1">Generar reporte</h1>
  </div>

  <div class="rounded-lg border border-line bg-surface p-6">
    <form id="report-form" class="space-y-5">

      <!-- Tipo de período -->
      <div>
        <label class="block text-xs text-slate-500 mb-1">Período</label>
        <select name="period" id="period-select"
                onchange="togglePeriodFields()"
                class="w-full rounded-md border border-line bg-surface2 px-3 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-signal focus:border-signal transition-colors">
          <option value="quarterly">Trimestral</option>
          <option value="monthly">Mensual</option>
          <option value="custom">Rango personalizado</option>
        </select>
      </div>

      <!-- Año -->
      <div id="year-field">
        <label class="block text-xs text-slate-500 mb-1">Año</label>
        <select name="year"
                class="w-full rounded-md border border-line bg-surface2 px-3 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-signal focus:border-signal transition-colors">
          {% for y in years %}
          <option value="{{ y }}" {{ 'selected' if y == current_year }}>{{ y }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Quarter (solo trimestral) -->
      <div id="quarter-field">
        <label class="block text-xs text-slate-500 mb-1">Trimestre</label>
        <select name="quarter"
                class="w-full rounded-md border border-line bg-surface2 px-3 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-signal focus:border-signal transition-colors">
          <option value="Q1">Q1 (Ene–Mar)</option>
          <option value="Q2">Q2 (Abr–Jun)</option>
          <option value="Q3">Q3 (Jul–Sep)</option>
          <option value="Q4">Q4 (Oct–Dic)</option>
        </select>
      </div>

      <!-- Rango personalizado -->
      <div id="custom-fields" class="hidden grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs text-slate-500 mb-1">Fecha desde</label>
          <input type="date" name="date_from"
                 class="w-full rounded-md border border-line bg-surface2 px-3 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-signal focus:border-signal transition-colors">
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1">Fecha hasta</label>
          <input type="date" name="date_to"
                 class="w-full rounded-md border border-line bg-surface2 px-3 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-signal focus:border-signal transition-colors">
        </div>
      </div>

      <!-- Formatos -->
      <div>
        <label class="block text-xs text-slate-500 mb-2">Formatos</label>
        <div class="flex gap-4">
          <label class="flex items-center gap-2 text-sm text-slate-300">
            <input type="checkbox" name="formats" value="xlsx" checked class="rounded border-line bg-surface2 accent-signal"> Excel (.xlsx)
          </label>
          <label class="flex items-center gap-2 text-sm text-slate-300">
            <input type="checkbox" name="formats" value="docx" class="rounded border-line bg-surface2 accent-signal"> Word (.docx)
          </label>
          <label class="flex items-center gap-2 text-sm {{ 'text-slate-300' if pdf_available else 'text-slate-600 cursor-not-allowed' }}"
                 {% if not pdf_available %}title="PDF no disponible en este servidor: falta WeasyPrint/GTK. Usa Excel o Word."{% endif %}>
            <input type="checkbox" name="formats" value="pdf"
                   class="rounded border-line bg-surface2 accent-signal"
                   {{ 'disabled' if not pdf_available }}>
            PDF
            {% if not pdf_available %}<span class="text-[11px] text-slate-500">(no disponible en este servidor)</span>{% endif %}
          </label>
        </div>
      </div>

      <button type="button" onclick="submitReport()"
              id="generate-btn"
              class="w-full bg-signal text-ink text-sm font-medium px-6 py-2.5 rounded-md hover:bg-signal/90 transition-colors disabled:opacity-50">
        Generar reporte
      </button>
      <div id="loading" class="hidden text-sm text-slate-400 text-center font-mono">
        Generando reporte, por favor espere…
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePeriodFields() {
  const period = document.getElementById('period-select').value;
  document.getElementById('quarter-field').classList.toggle('hidden', period !== 'quarterly');
  document.getElementById('year-field').classList.toggle('hidden', period === 'custom');
  document.getElementById('custom-fields').classList.toggle('hidden', period !== 'custom');
}

async function submitReport() {
  const form = document.getElementById('report-form');
  const btn = document.getElementById('generate-btn');
  const loading = document.getElementById('loading');

  const period = form.querySelector('[name=period]').value;
  const year = form.querySelector('[name=year]')?.value;
  const quarter = form.querySelector('[name=quarter]')?.value;
  const date_from = form.querySelector('[name=date_from]')?.value || null;
  const date_to = form.querySelector('[name=date_to]')?.value || null;
  const formats = Array.from(form.querySelectorAll('[name=formats]:checked')).map(c => c.value);

  if (!formats.length) { alert('Selecciona al menos un formato'); return; }

  btn.disabled = true;
  loading.classList.remove('hidden');

  try {
    const resp = await fetch('/api/v1/reports/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({period, year: year ? parseInt(year) : null, quarter, date_from, date_to, formats}),
    });
    if (!resp.ok) {
      const err = await resp.json();
      alert('Error: ' + (err.detail || resp.statusText));
      return;
    }
    const cd = resp.headers.get('Content-Disposition') || '';
    const fname = cd.match(/filename="(.+)"/)?.[1] || 'reporte';
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fname; a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('Error de red: ' + e.message);
  } finally {
    btn.disabled = false;
    loading.classList.add('hidden');
  }
}
</script>
{% endblock %}
