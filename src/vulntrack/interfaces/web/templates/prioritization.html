{% extends "base.html" %}
{% block title %}Priorización — VulnTrack Reports{% endblock %}

{% block content %}
<div class="space-y-6">

  <div>
    <p class="font-mono text-xs uppercase tracking-[0.2em] text-signal">Portafolio</p>
    <h1 class="font-display text-3xl font-semibold text-slate-50 mt-1">Hallazgos priorizados</h1>
  </div>

  <!-- Filtros -->
  <form method="get"
        hx-get="/prioritization"
        hx-target="#findings-table"
        hx-swap="outerHTML"
        class="rounded-lg border border-line bg-surface p-4 flex flex-wrap gap-4 items-end">
    <label class="flex items-center gap-2 text-sm font-medium text-slate-300">
      <input type="checkbox" name="kev_only" value="true" {{ 'checked' if kev_only }}
             class="rounded border-line bg-surface2 accent-signal">
      Solo KEV
    </label>
    <div>
      <label class="block text-xs text-slate-500 mb-1">CVSS mínimo</label>
      <input type="number" name="min_cvss" value="{{ min_cvss or '' }}" min="0" max="10" step="0.1"
             placeholder="0.0"
             class="rounded-md border border-line bg-surface2 px-2 py-1.5 text-sm w-20 text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-signal focus:border-signal transition-colors">
    </div>
    <div>
      <label class="block text-xs text-slate-500 mb-1">EPSS mínimo</label>
      <input type="number" name="min_epss" value="{{ min_epss or '' }}" min="0" max="1" step="0.01"
             placeholder="0.00"
             class="rounded-md border border-line bg-surface2 px-2 py-1.5 text-sm w-20 text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-signal focus:border-signal transition-colors">
    </div>
    <div>
      <label class="block text-xs text-slate-500 mb-1">Sprint</label>
      <select name="sprint_id"
              class="rounded-md border border-line bg-surface2 px-2 py-1.5 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-signal focus:border-signal transition-colors">
        <option value="">Todos</option>
        {% for s in sprints %}
        <option value="{{ s.id }}" {{ 'selected' if sprint_id == s.id }}>{{ s.nombre }} ({{ s.q_label }})</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-xs text-slate-500 mb-1">Estado de tratamiento</label>
      <select name="treatment_status"
              class="rounded-md border border-line bg-surface2 px-2 py-1.5 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-signal focus:border-signal transition-colors">
        <option value="">Todos</option>
        {% for st in ['PENDIENTE', 'EN_CURSO', 'FINALIZADA', 'POSPUESTA', 'NO_CUMPLIDA', 'DESCARTADA'] %}
        <option value="{{ st }}" {{ 'selected' if treatment_status == st }}>{{ st }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="bg-signal text-ink text-sm font-medium px-4 py-2 rounded-md hover:bg-signal/90 transition-colors">
      Filtrar
    </button>
    <a href="/prioritization" class="text-sm text-slate-400 px-3 py-2 border border-line rounded-md hover:border-signal/50 hover:text-slate-200 transition-colors">
      Limpiar
    </a>
  </form>

  <!-- Tabla de hallazgos -->
  {% include "partials/prioritization_findings_table.html" %}
</div>
{% endblock %}
