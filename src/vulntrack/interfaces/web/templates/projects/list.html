{% extends "base.html" %}
{% block title %}Proyectos — VulnTrack Reports{% endblock %}

{% block content %}
<div class="space-y-6">

  <!-- Encabezado -->
  <div class="flex flex-wrap items-end justify-between gap-4">
    <div>
      <p class="font-mono text-xs uppercase tracking-[0.2em] text-signal">Portafolio</p>
      <h1 class="font-display text-3xl font-semibold text-slate-50 mt-1">Proyectos</h1>
    </div>
    <span class="font-mono text-xs text-slate-500">{{ total }} proyecto{{ 's' if total != 1 else '' }}</span>
  </div>

  <!-- Filtro de búsqueda -->
  <form method="get" class="flex flex-wrap items-center gap-2">
    <div class="relative flex-1 max-w-xs">
      <svg class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
        <circle cx="11" cy="11" r="7" stroke-linecap="round"/>
        <path d="M20 20l-3.5-3.5" stroke-linecap="round"/>
      </svg>
      <input type="text" name="search" value="{{ search or '' }}"
             placeholder="Buscar proyecto…"
             class="w-full rounded-md border border-line bg-surface pl-9 pr-3 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-signal focus:border-signal transition-colors">
    </div>
    <button type="submit" class="bg-signal text-ink text-sm font-medium px-4 py-2 rounded-md hover:bg-signal/90 transition-colors">
      Buscar
    </button>
    {% if search %}
    <a href="/projects" class="text-sm text-slate-400 px-3 py-2 border border-line rounded-md hover:border-signal/50 hover:text-slate-200 transition-colors">Limpiar</a>
    {% endif %}
  </form>

  {% include "partials/project_list_table.html" %}
</div>
{% endblock %}
