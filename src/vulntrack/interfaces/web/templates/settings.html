{% extends "base.html" %}
{% block title %}Configuración — VulnTrack{% endblock %}

{% block content %}
<div class="max-w-2xl space-y-6">
  <h1 class="text-2xl font-bold text-navy">Configuración</h1>

  <!-- Test de conexión -->
  <div class="bg-white rounded-lg shadow p-5">
    <h2 class="text-lg font-semibold text-navy mb-3">Conexión a Dependency-Track</h2>
    <div class="space-y-3">
      <div>
        <span class="text-sm font-medium text-gray-600">URL base:</span>
        <span class="ml-2 text-sm font-mono">{{ dt_base_url }}</span>
      </div>
      <div class="flex items-center gap-3">
        <button
          hx-post="/api/v1/config/test-connection"
          hx-target="#conn-result"
          hx-swap="innerHTML"
          class="bg-navy text-white text-sm px-4 py-2 rounded hover:bg-blue-800">
          Probar conexión
        </button>
        <div id="conn-result" class="text-sm"></div>
      </div>
    </div>
  </div>

  <!-- Parámetros editables -->
  <div class="bg-white rounded-lg shadow p-5">
    <h2 class="text-lg font-semibold text-navy mb-4">Parámetros de operación</h2>
    <form id="config-form" class="space-y-4">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Intervalo sync (horas)</label>
          <input type="number" name="sync_interval_hours" value="{{ cfg.sync_interval_hours }}"
                 min="1" max="168"
                 class="border rounded px-3 py-2 text-sm w-full focus:ring-2 focus:ring-navy">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Umbral KEV obsoleto (días)</label>
          <input type="number" name="kev_stale_days" value="{{ cfg.kev_stale_days }}"
                 min="1" max="30"
                 class="border rounded px-3 py-2 text-sm w-full focus:ring-2 focus:ring-navy">
        </div>
      </div>

      <div>
        <h3 class="text-sm font-semibold text-gray-700 mb-2">Pesos de priorización</h3>
        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="block text-xs text-gray-500 mb-1">CVSS (w_cvss)</label>
            <input type="number" name="w_cvss_weight" value="{{ cfg.w_cvss_weight }}"
                   min="0" max="1" step="0.05"
                   class="border rounded px-3 py-2 text-sm w-full focus:ring-2 focus:ring-navy">
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">EPSS (w_epss)</label>
            <input type="number" name="w_epss_weight" value="{{ cfg.w_epss_weight }}"
                   min="0" max="1" step="0.05"
                   class="border rounded px-3 py-2 text-sm w-full focus:ring-2 focus:ring-navy">
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">KEV (w_kev)</label>
            <input type="number" name="w_kev_weight" value="{{ cfg.w_kev_weight }}"
                   min="0" max="1" step="0.05"
                   class="border rounded px-3 py-2 text-sm w-full focus:ring-2 focus:ring-navy">
          </div>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-4">
        <div>
          <label class="block text-xs text-gray-500 mb-1">KEV score mínimo</label>
          <input type="number" name="kev_minimum_score" value="{{ cfg.kev_minimum_score }}"
                 min="0" max="100" step="1"
                 class="border rounded px-3 py-2 text-sm w-full focus:ring-2 focus:ring-navy">
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">EPSS umbral alto</label>
          <input type="number" name="epss_high_threshold" value="{{ cfg.epss_high_threshold }}"
                 min="0" max="1" step="0.01"
                 class="border rounded px-3 py-2 text-sm w-full focus:ring-2 focus:ring-navy">
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">CVSS umbral alto</label>
          <input type="number" name="cvss_high_threshold" value="{{ cfg.cvss_high_threshold }}"
                 min="0" max="10" step="0.1"
                 class="border rounded px-3 py-2 text-sm w-full focus:ring-2 focus:ring-navy">
        </div>
      </div>

      <div class="flex items-center gap-3">
        <button type="button" onclick="saveConfig()"
                class="bg-navy text-white px-6 py-2 rounded hover:bg-blue-800">
          Guardar cambios
        </button>
        <div id="save-result" class="text-sm"></div>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function saveConfig() {
  const form = document.getElementById('config-form');
  const result = document.getElementById('save-result');
  const inputs = form.querySelectorAll('input[name]');
  const body = {};
  inputs.forEach(inp => {
    const val = inp.value.trim();
    if (val !== '') body[inp.name] = parseFloat(val) || parseInt(val) || val;
  });
  try {
    const resp = await fetch('/api/v1/config', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    if (resp.ok) {
      result.innerHTML = '<span class="text-green-600">✓ Guardado correctamente</span>';
    } else {
      const err = await resp.json();
      result.innerHTML = '<span class="text-red-600">Error: ' + (err.detail || resp.statusText) + '</span>';
    }
  } catch(e) {
    result.innerHTML = '<span class="text-red-600">Error de red</span>';
  }
}

// Format test-connection HTMX response
document.body.addEventListener('htmx:afterSwap', function(e) {
  if (e.detail.target.id === 'conn-result') {
    try {
      const data = JSON.parse(e.detail.target.innerText);
      if (data.ok) {
        e.detail.target.innerHTML = '<span class="text-green-600">✓ Conectado — DT v' + data.dt_version + '</span>';
      } else {
        e.detail.target.innerHTML = '<span class="text-red-600">✗ Error: ' + data.error + '</span>';
      }
    } catch(ex) {}
  }
});
</script>
{% endblock %}
