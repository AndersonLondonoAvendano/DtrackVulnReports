{% extends "base.html" %}
{% block title %}Remediación — VulnTrack Reports{% endblock %}

{% block content %}
<div class="space-y-6">

  <div>
    <p class="font-mono text-xs uppercase tracking-[0.2em] text-signal">Remediación</p>
    <h1 class="font-display text-3xl font-semibold text-slate-50 mt-1">Planes de remediación</h1>
  </div>

  <!-- T-E021: creación de planes vive aquí (ya no en el detalle de proyecto) -->
  <div class="rounded-lg border border-line bg-surface p-5">
    <h2 class="font-display text-sm font-semibold uppercase tracking-wide text-slate-200 mb-4">Nuevo plan</h2>
    <form method="post" action="/remediation" class="flex flex-wrap gap-3 items-end">
      <div class="flex-1 min-w-48">
        <label class="block text-xs text-slate-500 mb-1">Nombre del plan *</label>
        <input type="text" name="name" required placeholder="Ej: Sprint de remediación Q3"
               class="w-full rounded-md border border-line bg-surface2 px-3 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-signal focus:border-signal transition-colors">
      </div>
      <div class="flex-1 min-w-48">
        <label class="block text-xs text-slate-500 mb-1">Proyecto *</label>
        <select name="project_uuid" required
                class="w-full rounded-md border border-line bg-surface2 px-3 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-signal focus:border-signal transition-colors">
          <option value="" disabled selected>Seleccionar proyecto…</option>
          {% for p in projects %}
          <option value="{{ p.uuid }}" {{ 'selected' if project_uuid == p.uuid }}>{{ p.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="flex-1 min-w-48">
        <label class="block text-xs text-slate-500 mb-1">Sprint *</label>
        <select name="sprint_id" required
                class="w-full rounded-md border border-line bg-surface2 px-3 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-signal focus:border-signal transition-colors">
          <option value="" disabled selected>Seleccionar sprint…</option>
          {% for s in sprints %}
          <option value="{{ s.id }}">{{ s.nombre }} ({{ s.q_label }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="flex-1 min-w-48">
        <label class="block text-xs text-slate-500 mb-1">Descripción (opcional)</label>
        <input type="text" name="description" placeholder="Hallazgos críticos…"
               class="w-full rounded-md border border-line bg-surface2 px-3 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-signal focus:border-signal transition-colors">
      </div>
      <button type="submit"
              class="bg-signal text-ink text-sm font-medium px-4 py-2 rounded-md hover:bg-signal/90 transition-colors whitespace-nowrap">
        + Crear plan
      </button>
    </form>
  </div>

  {% include "partials/remediation_plans_table.html" %}
</div>
{% endblock %}
