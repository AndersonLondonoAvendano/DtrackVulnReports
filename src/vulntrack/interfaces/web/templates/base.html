<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}VulnTrack Reports{% endblock %}</title>

  <!-- Tipografía: Space Grotesk (display) / Inter (texto) / IBM Plex Mono (datos, CVE IDs) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            /* Rampa de severidad */
            critical:   '#E4483C',
            high:       '#F0954D',
            medium:     '#E8C547',
            low:        '#4FAE8E',
            unassigned: '#6B7385',
            /* Superficie de consola */
            navy:     '#16233D',
            ink:      '#0B1120',
            surface:  '#121A2E',
            surface2: '#182541',
            line:     '#24304A',
            signal:   '#5EC8D8',
          },
          fontFamily: {
            display: ['"Space Grotesk"', 'sans-serif'],
            sans: ['Inter', 'sans-serif'],
            mono: ['"IBM Plex Mono"', 'monospace'],
          },
        }
      }
    }
  </script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/json-enc.js" defer></script>

  <!-- Chart.js para el dashboard web -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    /* Colores de severidad para heatmap */
    .sev-critical { background-color: #E4483C; color: white; }
    .sev-high     { background-color: #F0954D; color: #1a1208; }
    .sev-medium   { background-color: #E8C547; color: #1a1a1a; }
    .sev-low      { background-color: #4FAE8E; color: #06110d; }
    .sev-unassigned { background-color: #6B7385; color: white; }
    .table-header { background-color: #182541; color: #cbd5e1; border-bottom: 1px solid #24304A; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
    :focus-visible { outline: 2px solid #5EC8D8; outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body class="bg-ink text-slate-200 min-h-screen font-sans antialiased">

  <!-- Navbar -->
  <nav class="border-b border-line bg-surface">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-display text-lg font-semibold tracking-tight text-slate-50">
        <svg class="h-5 w-5 text-signal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <path d="M12 3l7 3v5c0 4.5-3 8.2-7 9.5-4-1.3-7-5-7-9.5V6l7-3z" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        VulnTrack <span class="text-slate-500 font-normal">Reports</span>
      </a>
      <div class="flex gap-6 text-sm font-medium text-slate-300">
        <a href="/"               class="hover:text-signal transition-colors">Dashboard</a>
        <a href="/projects"       class="hover:text-signal transition-colors">Proyectos</a>
        <a href="/prioritization" class="hover:text-signal transition-colors">Priorización</a>
        <a href="/kev"            class="hover:text-signal transition-colors">KEV</a>
        <a href="/reports"        class="hover:text-signal transition-colors">Reportes</a>
        <a href="/remediation"    class="hover:text-signal transition-colors">Remediación</a>
        <a href="/sprints"        class="hover:text-signal transition-colors">Sprints</a>
        <a href="/settings"       class="hover:text-signal transition-colors">Configuración</a>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-line mt-12 py-4 text-center text-xs text-slate-500 font-mono">
    VulnTrack Reports
  </footer>

  <!-- T-E030: toast genérico de error para respuestas HTMX 4xx/5xx -- evita
       páginas en blanco o JSON crudo cuando una acción falla (409, 422, etc). -->
  <div id="global-error-toast"
       class="hidden fixed bottom-4 right-4 z-[100] max-w-sm rounded-md border px-4 py-3 shadow-lg text-sm"
       role="alert" aria-live="assertive">
    <div class="flex items-start gap-3">
      <span id="global-error-toast-message" class="flex-1"></span>
      <button type="button" onclick="document.getElementById('global-error-toast').classList.add('hidden')"
              class="text-current opacity-70 hover:opacity-100 leading-none">&times;</button>
    </div>
  </div>
  <script>
    (function () {
      // Filtros opcionales (CVSS/EPSS mínimo, sprint, estado, etc.) viajan
      // como campos vacíos cuando el usuario no los usa -- FastAPI rechaza
      // con 422 un query param tipado `float | None`/`int | None` que llega
      // como cadena vacía ("no es un número válido"). En vez de reproducir
      // esta limpieza en cada formulario/paginación, se hace una sola vez
      // aquí para cualquier request disparado por htmx en toda la app.
      document.body.addEventListener('htmx:configRequest', function (evt) {
        var params = evt.detail.parameters;
        Object.keys(params).forEach(function (key) {
          if (params[key] === '') { delete params[key]; }
        });
      });

      var toast = document.getElementById('global-error-toast');
      var messageEl = document.getElementById('global-error-toast-message');
      var hideTimer = null;

      function showError(message, status) {
        messageEl.textContent = message;
        var isServerError = status >= 500;
        toast.className = toast.className
          .replace(/bg-\S+|text-\S+|ring-\S+|border-\S+/g, '')
          .trim();
        toast.classList.add(
          'fixed', 'bottom-4', 'right-4', 'z-[100]', 'max-w-sm', 'rounded-md',
          'border', 'px-4', 'py-3', 'shadow-lg', 'text-sm'
        );
        if (isServerError) {
          toast.classList.add('bg-critical/15', 'text-critical', 'border-critical/40');
        } else {
          toast.classList.add('bg-medium/15', 'text-medium', 'border-medium/40');
        }
        toast.classList.remove('hidden');
        if (hideTimer) { clearTimeout(hideTimer); }
        hideTimer = setTimeout(function () { toast.classList.add('hidden'); }, 8000);
      }

      function extractDetail(xhr) {
        try {
          var body = JSON.parse(xhr.responseText);
          if (body && typeof body.detail === 'string') { return body.detail; }
          if (body && Array.isArray(body.detail) && body.detail.length) {
            // Errores de validación de FastAPI/Pydantic (422): lista de objetos.
            return body.detail.map(function (d) { return d.msg || String(d); }).join('; ');
          }
        } catch (e) { /* respuesta no era JSON */ }
        return 'Ocurrió un error inesperado (HTTP ' + xhr.status + ').';
      }

      document.body.addEventListener('htmx:responseError', function (evt) {
        var xhr = evt.detail.xhr;
        showError(extractDetail(xhr), xhr.status);
      });
      document.body.addEventListener('htmx:sendError', function () {
        showError('No se pudo conectar con el servidor. Verifica tu conexión.', 0);
      });

      // Expuesto para acciones que no pasan por htmx (p. ej. fetch() manual
      // desde el selector de estado de tratamientos) y quieren reusar el
      // mismo toast global en vez de duplicar el mecanismo.
      window.showGlobalErrorToast = showError;
      window.extractErrorDetailFromResponseText = function (responseText, status) {
        return extractDetail({ responseText: responseText, status: status });
      };
    })();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
